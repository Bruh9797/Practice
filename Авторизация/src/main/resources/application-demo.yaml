spring:
  datasource:
    url: jdbc:h2:file:./data/thermoselect;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

server:
  servlet:
    session:
      cookie:
        secure: false

app:
  security:
    admin:
      username: admin
      password: admin12345
      email: admin@thermoselect.local
    demo-user:
      enabled: true
      username: demo
      password: demo12345
      email: demo@thermoselect.local

logging:
  file:
    name: logs/thermoselect.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
      total-size-cap: 100MB
