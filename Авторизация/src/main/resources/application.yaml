spring:
  application:
    name: thermoselect
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mvc:
    problemdetails:
      enabled: false

server:
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        same-site: lax
